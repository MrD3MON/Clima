<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Droplet Outline Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <!-- Sun Crescent Gradient -->
    <linearGradient id="sunCrescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <!-- Wave Fill -->
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Droplet Outer Shell -->
  <path
    d="M50 12 C50 12, 18 45, 18 64 A32 32 0 0 0 82 64 C82 45, 50 12, 50 12z"
    stroke="url(#dropGrad)"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Nested Crescent Sun -->
  <path
    d="M50 32a18 18 0 0 1 18 18c0 3.6-1 7-2.9 9.8A17.9 17.9 0 0 0 50 32z"
    fill="url(#sunCrescent)"
  />

  <!-- Wave at the bottom of the droplet -->
  <path
    d="M21.5 66 C 30 60, 40 70, 50 64 C 60 58, 70 68, 78.5 62 A27 27 0 0 1 21.5 66z"
    fill="url(#waveGrad)"
  />
  <path
    d="M21.5 66 C 30 60, 40 70, 50 64 C 60 58, 70 68, 78.5 62"
    stroke="#60A5FA"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
</svg>
