<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Concentric Border Circle -->
  <circle cx="50" cy="50" r="42" stroke="url(#primaryGrad)" stroke-width="4" stroke-dasharray="8 6" opacity="0.6" />

  <!-- Inner Sun -->
  <circle cx="42" cy="42" r="12" fill="url(#sunGrad)" stroke="#D97706" stroke-width="2" />

  <!-- Raindrop -->
  <path
    d="M62 52c0 3.3-2.7 6-6 6s-6-2.7-6-6c0-4.8 6-12 6-12s6 7.2 6 12z"
    fill="#3B82F6"
    stroke="#1D4ED8"
    stroke-width="2"
  />

  <!-- Wind Swoosh Line -->
  <path
    d="M20 62h48a10 10 0 0 0 0-20H45"
    stroke="#475569"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
