<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Sun Glow Gradient -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="1" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0" />
    </radialGradient>
    <!-- Wave Gradient 1 -->
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <!-- Wave Gradient 2 -->
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F093FB" />
      <stop offset="100%" stop-color="#F5576C" />
    </linearGradient>
  </defs>

  <!-- Glowing Sun Orb -->
  <circle cx="65" cy="35" r="25" fill="url(#sunGlow)" />
  <circle cx="65" cy="35" r="12" fill="#F59E0B" opacity="0.9" />

  <!-- Aurora / Climate Wavy Ribbon 1 -->
  <path d="M15 65 C 30 40, 50 80, 85 50" stroke="url(#aurora1)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" />
  
  <!-- Aurora / Climate Wavy Ribbon 2 (overlapping) -->
  <path d="M15 50 C 35 75, 55 35, 85 65" stroke="url(#aurora2)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85" />
  
  <!-- Micro climate droplets/particles -->
  <circle cx="28" cy="42" r="2.5" fill="#00F2FE" />
  <circle cx="48" cy="62" r="3.5" fill="#F093FB" />
  <circle cx="72" cy="58" r="2" fill="#FFE066" />
</svg>
