<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Neon Stroke Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#9b51e0" />
      <stop offset="100%" stop-color="#F5576C" />
    </linearGradient>
    <!-- Glowing shadow blur filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background elements -->
  <path
    d="M30 65a12 12 0 0 1 12-12h1c1.2-5.4 6-9.5 11.8-9.5 6.7 0 12.2 5.4 12.2 12a12.2 12.2 0 0 1-1.3 5.5H74a12 12 0 0 1 0 24H30a12 12 0 0 1 0-24z"
    stroke="url(#neonGrad)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.15"
    filter="url(#neonGlow)"
  />

  <!-- Crisp foreground Neon line -->
  <path
    d="M30 65a12 12 0 0 1 12-12h1c1.2-5.4 6-9.5 11.8-9.5 6.7 0 12.2 5.4 12.2 12a12.2 12.2 0 0 1-1.3 5.5H74a12 12 0 0 1 0 24H30a12 12 0 0 1 0-24z"
    stroke="url(#neonGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#neonGlow)"
  />

  <!-- Minimal rain indicators inside/under cloud -->
  <path d="M42 84l-2 6M54 84l-2 6M66 84l-2 6" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" />
</svg>
