<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 20 70 70" fill="none">
  <style>
    :root {
      --primary: #10B981;
      --primary-opacity: rgba(16, 185, 129, 0.2);
      --muted: rgba(156, 163, 175, 0.75);
      --card: #1f2937;
      --foreground: #f3f4f6;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --primary: #059669;
        --primary-opacity: rgba(5, 150, 105, 0.2);
        --muted: rgba(107, 114, 128, 0.75);
        --card: #ffffff;
        --foreground: #1f2937;
      }
    }
    .back-left {
      fill: var(--primary-opacity);
      stroke: var(--primary);
    }
    .back-right {
      fill: var(--muted);
      stroke: var(--foreground);
    }
    .front-center {
      fill: var(--card);
      stroke: var(--foreground);
    }
  </style>
  <g>
    <!-- Back Left Cloud -->
    <path
      d="M 20 55 a 10 10 0 0 1 12 -9.5 a 14 14 0 0 1 24 -4.5 a 11 11 0 0 1 12 14 H 20 z"
      transform="translate(0, 14) scale(0.8)"
      class="back-left"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Back Right Cloud -->
    <path
      d="M 20 55 a 10 10 0 0 1 12 -9.5 a 14 14 0 0 1 24 -4.5 a 11 11 0 0 1 12 14 H 20 z"
      transform="translate(18, 17) scale(0.8)"
      class="back-right"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Front Center Cloud -->
    <path
      d="M 20 55 a 10 10 0 0 1 12 -9.5 a 14 14 0 0 1 24 -4.5 a 11 11 0 0 1 12 14 H 20 z"
      transform="translate(6, 22) scale(1)"
      class="front-center"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
  </g>
</svg>
